name: Update Profile README

on:
  schedule:
    # Runs every day at 01:00 UTC (after the snake workflow)
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update last-refreshed timestamp
        run: |
          echo "Last refreshed: $(date -u '+%Y-%m-%d %H:%M UTC')" > .last-refreshed
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .last-refreshed
          git diff --cached --quiet || git commit -m "chore: refresh profile stats [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
